<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Ecoyaan checkout flow diagram">
  <defs>
    <style>
      .title{font: 700 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;}
      .label{font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;}
      .sub{font: 400 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill:#6B7280;}
      .muted{fill:#111827;}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="320" fill="#ffffff"/>
  <text x="60" y="56" class="title muted">Ecoyaan checkout flow</text>

  <!-- Card 1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="95" rx="16" ry="16" width="320" height="150" fill="#ffffff" stroke="#A7F3D0"/>
  </g>
  <!-- Cart icon -->
  <g transform="translate(92,125)" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 10h8l4 18h18l4-14H20" />
    <circle cx="22" cy="34" r="2.5" fill="#059669" stroke="none"/>
    <circle cx="34" cy="34" r="2.5" fill="#059669" stroke="none"/>
  </g>
  <text x="150" y="148" class="label muted">Cart</text>
  <text x="150" y="174" class="sub">Review items &amp; totals (SSR cart data)</text>

  <!-- Arrow 1 -->
  <path d="M400 170h70" stroke="#D1D5DB" stroke-width="4" stroke-linecap="round"/>
  <path d="M470 170l-14-10v20z" fill="#D1D5DB"/>

  <!-- Card 2 -->
  <g filter="url(#shadow)">
    <rect x="490" y="95" rx="16" ry="16" width="320" height="150" fill="#ffffff" stroke="#A7F3D0"/>
  </g>
  <!-- Pin icon -->
  <g transform="translate(522,124)" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 36s12-10 12-20a12 12 0 1 0-24 0c0 10 12 20 12 20z"/>
    <circle cx="22" cy="16" r="4"/>
  </g>
  <text x="580" y="148" class="label muted">Shipping</text>
  <text x="580" y="174" class="sub">Address form + validation (RHF + Zod)</text>

  <!-- Arrow 2 -->
  <path d="M830 170h70" stroke="#D1D5DB" stroke-width="4" stroke-linecap="round"/>
  <path d="M900 170l-14-10v20z" fill="#D1D5DB"/>

  <!-- Card 3 -->
  <g filter="url(#shadow)">
    <rect x="920" y="95" rx="16" ry="16" width="320" height="150" fill="#ffffff" stroke="#A7F3D0"/>
  </g>
  <!-- Card/check icon -->
  <g transform="translate(952,128)" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="6" width="44" height="30" rx="6"/>
    <path d="M12 18h14"/>
    <path d="M28 34l6 6 12-14"/>
  </g>
  <text x="1010" y="148" class="label muted">Payment &amp; Success</text>
  <text x="1010" y="174" class="sub">Review ’ Pay securely ’ Order successful</text>
</svg>

